{% extends 'diaries/base.html' %}

{% block title %}Login — Group6 Diary{% endblock %}

{% block content %}
<div class="page-auth">

    <h1>Login</h1>

    <form method="POST" class="auth-form">
        {% csrf_token %}

        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" placeholder="Enter your username" required>
        </div>

        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" placeholder="Enter your password" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Login</button>
        </div>

    </form>

    <p class="auth-switch">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>

</div>
{% endblock %}
